name: AccessReady PR Comment

# Posts (and keeps updating) a single AccessReady preflight summary comment on each pull request.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  accessready-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Adjust the scan paths to match where your content lives.
      - run: npm run accessready -- scan samples --format pr-comment --out accessready-comment.md --ignore "**/generated-*"
      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('accessready-comment.md', 'utf8');
            const marker = '<!-- accessready-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
